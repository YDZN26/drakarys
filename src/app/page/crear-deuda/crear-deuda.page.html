<ion-header>
  <ion-toolbar color="mycolor">
    <ion-buttons slot="start">
      <ion-button (click)="cancelar()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Crear Deuda</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-item>
    <ion-label position="stacked">Cliente</ion-label>
    <ion-input [(ngModel)]="cliente" placeholder="Nombre del cliente"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Descripción</ion-label>
    <ion-textarea [(ngModel)]="descripcion" placeholder="Ej: Préstamo, producto fiado..."></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Total deuda (Bs.)</ion-label>
    <ion-input [(ngModel)]="totalDeuda" type="number" placeholder="0"></ion-input>
  </ion-item>

  <div class="acciones">
    <ion-button expand="block" class="btn-guardar" (click)="guardarDeuda()">Guardar</ion-button>
    <ion-button expand="block" fill="outline" class="btn-cancelar" (click)="cancelar()">Cancelar</ion-button>
  </div>

</ion-content>
